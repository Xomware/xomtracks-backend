[pytest]
# Pytest configuration for Lambda tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Add markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests

asyncio_mode = auto

# Test output
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Coverage settings
[coverage:run]
source = lambdas,extractor
omit =
    */tests/*
    */__init__.py
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
